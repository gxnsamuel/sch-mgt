{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow-sm">

        <div class="card-header">

            <h5 class="mb-0">
                Add Academic Year
            </h5>

        </div>

        <div class="card-body">

            {% include "includes/messages.html" %}

            <form method="POST">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-4 mb-3">

                        <label class="form-label">
                            Academic Year Name
                        </label>

                        <input
                            type="text"
                            name="name"
                            class="form-control"
                            placeholder="2026"
                            required>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="form-label">
                            Start Date
                        </label>

                        <input
                            type="date"
                            name="start_date"
                            class="form-control"
                            required>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="form-label">
                            End Date
                        </label>

                        <input
                            type="date"
                            name="end_date"
                            class="form-control"
                            required>

                    </div>

                </div>

                <div class="form-check mb-3">

                    <input
                        type="checkbox"
                        name="is_active"
                        class="form-check-input"
                        id="activeCheck">

                    <label
                        class="form-check-label"
                        for="activeCheck">

                        Set as Active Academic Year

                    </label>

                </div>

                <button
                    type="submit"
                    class="btn btn-primary">

                    <i class="bi bi-save"></i>
                    Save

                </button>

                <a href="{% url 'academics:academic_year_list' %}"
                   class="btn btn-secondary">

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
