{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow-sm">

        <div class="card-header">

            <h5 class="mb-0">
                Update Academic Year
            </h5>

        </div>

        <div class="card-body">

            {% include "includes/messages.html" %}

            <form method="POST">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-4 mb-3">

                        <label class="form-label">
                            Name
                        </label>

                        <input
                            type="text"
                            name="name"
                            value="{{ year.name }}"
                            class="form-control"
                            required>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="form-label">
                            Start Date
                        </label>

                        <input
                            type="date"
                            name="start_date"
                            value="{{ year.start_date|date:'Y-m-d' }}"
                            class="form-control"
                            required>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="form-label">
                            End Date
                        </label>

                        <input
                            type="date"
                            name="end_date"
                            value="{{ year.end_date|date:'Y-m-d' }}"
                            class="form-control"
                            required>

                    </div>

                </div>

                <div class="form-check mb-3">

                    <input
                        type="checkbox"
                        name="is_active"
                        class="form-check-input"
                        {% if year.is_active %}
                        checked
                        {% endif %}
                        id="activeCheck">

                    <label
                        class="form-check-label"
                        for="activeCheck">

                        Active Academic Year

                    </label>

                </div>

                <button
                    class="btn btn-success">

                    <i class="bi bi-check-circle"></i>
                    Update

                </button>

                <a href="{% url 'academics:academic_year_list' %}"
                   class="btn btn-secondary">

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
