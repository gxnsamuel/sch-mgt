{% extends 'base.html' %}

{% block title %}Set Password{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <div class="bg-primary bg-opacity-10 rounded-circle d-inline-flex p-3 mb-3">
                                <i class="bi bi-key-fill text-primary" style="font-size: 3rem;"></i>
                            </div>
                            <h4 class="fw-bold">Set Your Password</h4>
                            <p class="text-muted small">Hi {{ first_name }}, create a secure password</p>
                        </div>
                        
                        <form method="post" action="{% url 'add_password' %}">
                            {% csrf_token %}
                            
                            <div class="mb-3">
                                <label for="password" class="form-label fw-semibold">
                                    Password <span class="text-danger">*</span>
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
                                    <input type="password" 
                                           class="form-control" 
                                           id="password" 
                                           name="password" 
                                           placeholder="Enter password"
                                           required>
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label for="confirm_password" class="form-label fw-semibold">
                                    Confirm Password <span class="text-danger">*</span>
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-lock-fill"></i></span>
                                    <input type="password" 
                                           class="form-control" 
                                           id="confirm_password" 
                                           name="confirm_password" 
                                           placeholder="Confirm password"
                                           required>
                                </div>
                            </div>
                            
                            <div class="alert alert-info border-0" role="alert">
                                <strong class="d-block mb-2"><i class="bi bi-info-circle"></i> Requirements:</strong>
                                <small>
                                    <ul class="mb-0 ps-3">
                                        <li>At least 8 characters</li>
                                        <li>One uppercase & lowercase letter</li>
                                        <li>One digit & special character</li>
                                    </ul>
                                </small>
                            </div>
                            
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="bi bi-check-circle"></i> Complete Setup
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
