                    <!-- Messages/Alerts -->
                    {% if messages %}
                        {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade w-50  my-2 py-3   show shadow-sm" role="alert">
                            {% if message.tags == 'error' %}
                                <i class="bi bi-exclamation-triangle-fill my-0 me-2"></i>
                            {% elif message.tags == 'success' %}
                                <i class="bi bi-check-circle-fill my-0 me-2"></i>
                            {% elif message.tags == 'warning' %}
                                <i class="bi bi-exclamation-circle-fill my-0 me-2"></i>
                            {% elif message.tags == 'info' %}
                                <i class="bi bi-info-circle-fill my-0 me-2"></i>
                            {% endif %}
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        {% endfor %}
                    {% endif %}
